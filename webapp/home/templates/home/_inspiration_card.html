{% load static %}
{% if card %}
<div class="flex flex-col overflow-hidden rounded-2xl border border-zinc-200 bg-white shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:shadow-md">
    {# Product media #}
    {% if card.media %}
    <div class="h-40 bg-zinc-100 overflow-hidden">
        <img src="{{ card.media.url }}" alt="{{ card.group.title }}" class="w-full h-full object-cover" loading="lazy">
    </div>
    {% else %}
    <div class="h-40 flex items-center justify-center bg-zinc-50 text-zinc-300">
        <svg xmlns="http://www.w3.org/2000/svg" class="size-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
    </div>
    {% endif %}

    <div class="p-4">
        <p class="text-xs font-medium text-indigo-600 mb-1">{{ card.group.title }}</p>
        {% if card.topic %}
        <p class="text-sm text-zinc-700 line-clamp-2">{{ card.topic }}</p>
        {% else %}
        <p class="text-sm text-zinc-400 italic">Could not generate a topic</p>
        {% endif %}

        {% if card.topic %}
        <a href="{% url 'social_media:post_form' %}?mode=ai&topic={{ card.topic|urlencode }}&seed_media_ids={{ card.seed_media_ids }}"
           up-layer="new" up-mode="modal" up-size="large" up-history="false" up-dismissable="false"
           class="mt-3 inline-flex items-center gap-1.5 rounded-lg bg-indigo-600 px-3 py-1.5 text-xs font-medium text-white shadow-sm transition-colors hover:bg-indigo-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="size-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Create Post
        </a>
        {% endif %}
    </div>
</div>
{% endif %}
