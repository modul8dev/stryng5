<main>
<div class="p-6 max-w-lg mx-auto">
    <h2 class="text-xl font-bold mb-2">Scrape Brand from Website</h2>
    <p class="text-sm text-zinc-500 mb-6">Enter your brand website URL. We'll extract your brand name, summary, language, style guide, and logo automatically.</p>

    {% if error %}
    <div class="flex items-center gap-3 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800 mb-4">
        {{ error }}
    </div>
    {% endif %}

    <form method="post"
          up-submit
          up-layer="current"
          novalidate
          id="brand-scrape-form">
        {% csrf_token %}

        <div id="url-field" class="form-control w-full mb-6">
            <label class="label" for="id_url">
                <span class="label-text font-medium">Website URL</span>
            </label>
            {{ form.url }}
            {% if form.url.errors %}
            <label class="label">
                <span class="label-text-alt text-error">{{ form.url.errors.0 }}</span>
            </label>
            {% endif %}
            <label class="label">
                <span class="label-text-alt text-zinc-400">e.g. https://yourbrand.com</span>
            </label>
        </div>

        <div id="scrape-spinner" style="display:none" class="flex flex-col items-center justify-center py-8">
            <span class="loading loading-spinner loading-lg text-indigo-600"></span>
            <p class="mt-4 text-sm text-zinc-500">Scraping brand data…</p>
            <p class="mt-1 text-xs text-zinc-400">This may take a moment.</p>
        </div>

        <div id="form-actions" class="flex justify-end gap-2">
            <button type="button" class="btn btn-ghost" up-dismiss>Cancel</button>
            <button type="submit" class="btn btn-primary"
                    onclick="document.getElementById('scrape-spinner').style.display='flex';document.getElementById('form-actions').style.display='none';document.getElementById('url-field').style.display='none'">
                Scrape
            </button>
        </div>
    </form>
</div>
</main>
