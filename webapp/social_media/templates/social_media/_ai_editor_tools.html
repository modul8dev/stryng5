<!-- {# ── Reusable AI editor toolbar + custom instruction bar ──────────────────────
   Uses Alpine context. Buttons act on `activeTab` (no args needed).
   Include inside any editor panel that should have AI editing capabilities.
#} -->

{# AI preset actions toolbar #}
<div class="mb-1">
    <div class="flex flex-wrap gap-1">
        <button type="button" @click="aiEditAction('rewrite')" :disabled="aiProcessing"
                class="btn btn-xs btn-soft btn-primary">Rewrite</button>
        <button type="button" @click="aiEditAction('improve')" :disabled="aiProcessing"
                class="btn btn-xs btn-soft btn-primary">Improve</button>
        <button type="button" @click="aiEditAction('shorten')" :disabled="aiProcessing"
                class="btn btn-xs btn-soft btn-primary">Shorten</button>
        <button type="button" @click="aiEditAction('expand')" :disabled="aiProcessing"
                class="btn btn-xs btn-soft btn-primary">Expand</button>
        <button type="button" @click="aiEditAction('make_engaging')" :disabled="aiProcessing"
                class="btn btn-xs btn-soft btn-primary">Make engaging</button>
        <button type="button" @click="aiEditAction('adapt_to_platform')" :disabled="aiProcessing"
                class="btn btn-xs btn-soft btn-primary">Adapt to platform</button>
        <button type="button" @click="aiEditAction('add_cta')" :disabled="aiProcessing"
                class="btn btn-xs btn-soft btn-primary">Add CTA</button>
        <button type="button" @click="aiEditAction('fix_grammar')" :disabled="aiProcessing"
                class="btn btn-xs btn-soft btn-primary">Fix grammar</button>
    </div>
    <div x-show="aiProcessing" class="mt-2 flex items-center gap-2 text-xs text-indigo-600">
        <svg class="animate-spin h-3 w-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        AI is editing…
    </div>
</div>
