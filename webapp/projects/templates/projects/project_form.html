<main>
<form method="post" up-submit up-layer="current" class="p-6">
    {% csrf_token %}

    <h2 class="text-lg font-semibold text-zinc-900 mb-4">
        {% if is_edit %}Rename Project{% else %}New Project{% endif %}
    </h2>

    <div class="space-y-4">
        <div>
            <label for="{{ form.name.id_for_label }}" class="block text-sm font-medium text-zinc-700 mb-1">
                Project Name
            </label>
            {{ form.name }}
            {% if form.name.errors %}
            <p class="mt-1 text-xs text-red-600">{{ form.name.errors.0 }}</p>
            {% endif %}
        </div>
    </div>

    <div class="mt-6 flex items-center justify-end gap-3">
        <button type="button" up-dismiss class="rounded-lg px-4 py-2 text-sm font-medium text-zinc-600 transition-colors hover:bg-zinc-100">
            Cancel
        </button>
        <button type="submit" class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition-colors hover:bg-indigo-500">
            {% if is_edit %}Save{% else %}Create Project{% endif %}
        </button>
    </div>
</form>
</main>
