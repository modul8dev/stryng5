<main>
<div class="p-6 max-w-lg mx-auto">
    <h2 class="text-xl font-bold mb-2">Import from URL</h2>
    <p class="text-sm text-zinc-500 mb-6">Enter a webpage URL to scrape and import all media as a new media group.</p>

    {% if importing %}
    <div x-data="productImportModal({ importing: true })">
        <div x-show="error" class="flex items-center gap-3 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800 mb-4" style="display:none">
            <span x-text="error"></span>
        </div>
        <div x-show="importing" class="flex flex-col items-center justify-center py-8">
            <span class="loading loading-spinner loading-lg text-indigo-600"></span>
            <p class="mt-4 text-sm text-zinc-500">Scraping page for media…</p>
            <p class="mt-1 text-xs text-zinc-400">You will be notified when it finishes.</p>
        </div>
        <div class="flex justify-end">
            <button type="button" class="btn btn-ghost" up-dismiss>Close</button>
        </div>
    </div>
    {% else %}

    {% if error %}
    <div class="flex items-center gap-3 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800 mb-4">
        {{ error }}
    </div>
    {% endif %}

    <form method="post"
          up-submit
          up-layer="current">
        {% csrf_token %}

        <div class="form-control w-full mb-6">
            <label class="label" for="page_url">
                <span class="label-text font-medium">Page URL</span>
            </label>
            <input type="url"
                   name="page_url"
                   id="page_url"
                   class="input input-bordered w-full"
                   placeholder="https://example.com/products"
                   value="{{ page_url|default:'' }}"
                   required>
            <label class="label">
                <span class="label-text-alt text-zinc-400">All media found on the page will be imported.</span>
            </label>
        </div>

        <div class="flex justify-end gap-2">
            <button type="button" class="btn btn-ghost" up-dismiss>Cancel</button>
            <button type="submit" class="btn btn-primary">Import</button>
        </div>
    </form>
    {% endif %}
</div>
</main>
