<c-vars
    actions=""
    custom_instruction=""
    custom_placeholder="Tell AI what to do with the text…"
    char_count=""
    auto_hide=""
    hide_delay="150"
    result_mode="replace"
    platform=""
    system_prompt=""
/>

<div
    x-data="aiTextarea({
        endpoint: '/social-media/ai/edit-text/',
        actionsStr: '{{ actions }}',
        showCustomInstruction: {% if custom_instruction %}true{% else %}false{% endif %},
        customPlaceholder: '{{ custom_placeholder|escapejs }}',
        showCharCount: {% if char_count %}true{% else %}false{% endif %},
        autoHide: {% if auto_hide %}true{% else %}false{% endif %},
        hideDelay: {{ hide_delay }},
        resultMode: '{{ result_mode }}',
        platform: '{{ platform }}',
        systemPrompt: '{{ system_prompt }}'
    })"
    @focusin="handleFocusIn($event)"
    @focusout="handleFocusOut($event)"
    class="mb-5 border border-base-300 rounded-xl overflow-hidden transition-colors focus-within:border-primary [&_textarea]:!border-0 [&_textarea]:!shadow-none [&_textarea]:!outline-none [&_textarea]:!ring-0 [&_input:not([type=button]):not([type=submit])]:!border-0 [&_input:not([type=button]):not([type=submit])]:!shadow-none [&_input:not([type=button]):not([type=submit])]:!outline-none [&_input:not([type=button]):not([type=submit])]:!ring-0"
>
    {# ── Char count ── #}
    <div x-show="showCharCount" class="flex items-center justify-end px-3 pt-1">
        <span class="text-xs text-zinc-400" x-text="charCountLabel()"></span>
    </div>

    {# ── AI toolbar ── #}
    <div x-show="showTools" class="px-2 pt-2 pb-1">
        <div class="flex flex-wrap items-center gap-1">
            <template x-for="action in actionsList" :key="action">
                <button
                    type="button"
                    @mousedown.prevent
                    @click="runAction(action)"
                    :disabled="processing"
                    class="btn btn-xs btn-soft btn-primary"
                    x-text="actionLabel(action)"
                ></button>
            </template>
            <div class="flex-1"></div>
            {# Undo / Redo #}
            <div class="flex gap-0.5">
                <button
                    type="button"
                    @mousedown.prevent
                    @click="undo()"
                    :disabled="!canUndo() || processing"
                    class="btn btn-xs btn-ghost btn-square"
                    title="Undo"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 14L4 9m0 0l5-5M4 9h11a6 6 0 010 12h-1"/>
                    </svg>
                </button>
                <button
                    type="button"
                    @mousedown.prevent
                    @click="redo()"
                    :disabled="!canRedo() || processing"
                    class="btn btn-xs btn-ghost btn-square"
                    title="Redo"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 14l5-5m0 0l-5-5m5 5H9a6 6 0 000 12h1"/>
                    </svg>
                </button>
            </div>
        </div>

        {# Inline error #}
        <div x-show="error" class="mt-1 text-xs text-red-600" x-text="error"></div>
    </div>

    {# ── Field widget + errors + help text ── #}
    {{ slot }}

    {# ── Custom instruction ── #}
    <div x-show="showTools && showCustomInstruction" class="border-t border-base-300 flex items-center gap-1 px-2 py-1.5">
        <input
            type="text"
            x-model="instruction"
            class="input input-sm flex-1 bg-transparent border-0 shadow-none outline-none focus:outline-none"
            :placeholder="customPlaceholder"
            @keydown.enter.prevent="runCustomInstruction()"
        />
        <button
            type="button"
            @mousedown.prevent
            @click="runCustomInstruction()"
            :disabled="processing || !instruction"
            class="btn btn-circle btn-sm btn-primary"
            title="Apply to text"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
            </svg>
        </button>
    </div>


</div>
