{% extends "account/base_auth.html" %}


{% block card %}
<div class="text-center">
    <div class="mx-auto mb-4 flex size-12 items-center justify-center rounded-full bg-emerald-100">
        <svg xmlns="http://www.w3.org/2000/svg" class="size-6 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
    </div>
    <h2 class="mb-2 text-lg font-semibold text-zinc-900">Check your email</h2>
    <p class="text-sm text-zinc-500">If an account exists with that email, we've sent password reset instructions.</p>
</div>
{% endblock %}

{% block below_card %}
<a href="{% url 'account_login' %}" class="font-medium text-indigo-600 hover:text-indigo-500">Back to sign in</a>
{% endblock %}
