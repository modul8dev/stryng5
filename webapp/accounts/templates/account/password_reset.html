{% extends "account/base_auth.html" %}


{% block card %}
<h2 class="mb-1 text-center text-lg font-semibold text-zinc-900">Reset your password</h2>
<p class="mb-6 text-center text-sm text-zinc-500">Enter your email and we'll send you a reset link.</p>

<form method="post" action="{% url 'account_reset_password' %}">
    {% csrf_token %}

    <div>
        <label for="id_email" class="mb-1 block text-sm font-medium text-zinc-700">Email</label>
        <input type="email" name="email" id="id_email" required autofocus
               class="input input-bordered w-full rounded-lg text-sm"
               placeholder="you@example.com"
               value="{{ form.email.value|default:'' }}">
        {% if form.email.errors %}
        <p class="mt-1 text-xs text-red-600">{{ form.email.errors.0 }}</p>
        {% endif %}
    </div>

    <button type="submit" class="btn btn-primary btn-block mt-6 rounded-lg text-sm">Send reset link</button>
</form>
{% endblock %}

{% block below_card %}
<a href="{% url 'account_login' %}" class="font-medium text-indigo-600 hover:text-indigo-500">Back to sign in</a>
{% endblock %}
