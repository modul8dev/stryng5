{% extends "account/base_auth.html" %}


{% block card %}
<div class="text-center">
    <div class="mx-auto mb-4 flex size-12 items-center justify-center rounded-full bg-emerald-100">
        <svg xmlns="http://www.w3.org/2000/svg" class="size-6 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
    </div>
    <h2 class="mb-2 text-lg font-semibold text-zinc-900">Password updated</h2>
    <p class="text-sm text-zinc-500">Your password has been successfully changed.</p>
</div>
{% endblock %}

{% block below_card %}
<a href="{% url 'account_login' %}" class="font-medium text-indigo-600 hover:text-indigo-500">Sign in</a>
{% endblock %}
