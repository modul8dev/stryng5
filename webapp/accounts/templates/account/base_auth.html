{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/src/output.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'images/logos/favicon.ico' %}">
    <title>Stryng</title>
    <script src="https://cdn.jsdelivr.net/npm/unpoly@3.14.2/unpoly.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/unpoly@3.14.2/unpoly.min.css">
</head>

<body class="flex min-h-screen items-center justify-center bg-zinc-50 text-zinc-900 antialiased">

    <div class="w-full max-w-sm px-4">
        <!-- Logo / brand -->
        <div class="mb-8 flex justify-center">
            <img src="{% static 'images/logos/logo-sm.png' %}" alt="Stryng" class="h-12 w-auto">
        </div>

        <!-- Flash messages -->
        {% if messages %}
        <div class="mb-4 space-y-2">
            {% for message in messages %}
            <div class="flex items-center gap-3 rounded-xl border px-4 py-3 text-sm
                {% if message.tags == 'error' %}border-red-200 bg-red-50 text-red-800
                {% elif message.tags == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-800
                {% else %}border-blue-200 bg-blue-50 text-blue-800{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <!-- Card -->
        <div class="rounded-2xl border border-zinc-200 bg-white p-8 shadow-sm">
            {% block card %}{% endblock %}
        </div>

        <!-- Below-card links -->
        <div class="mt-6 text-center text-sm text-zinc-500">
            {% block below_card %}{% endblock %}
        </div>
    </div>

</body>
</html>
