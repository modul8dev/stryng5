name: Deploy to EC2

run-name: ${{ github.event_name == 'workflow_dispatch' && format('[{0}] - {1}', github.event.inputs.environment, github.workflow) || format('[uat] - {0}', github.event.head_commit.message) }}

on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        type: choice
        options:
          - uat
          - prod
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'uat' }}
    concurrency:
      group: deploy-ec2-${{ github.event.inputs.environment || 'uat' }}
      cancel-in-progress: false

    env:
      TARGET_ENV: ${{ github.event.inputs.environment || 'uat' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Export secrets from AWS Secrets Manager
        uses: say8425/aws-secrets-manager-actions@v2
        with:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          SECRET_NAME: ${{ env.AWS_SECRET_NAME }}
          OUTPUT_PATH: '.env'

      - name: Install jinjanator
        run: pip install jinjanator

      - name: Template nginx configuration
        run: |
          jinjanate deploy/nginx/nginx.conf.j2 \
            --env-file .env \
            -o deploy/nginx/nginx.conf

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".env,deploy/nginx/nginx.conf"
          target: "~/repo/scp"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd ~/repo/stryng5

            # Put rendered files in place
            mv ~/repo/scp/deploy/nginx/nginx.conf docker/nginx/nginx.conf
            mv ~/repo/scp/.env .env

            # Pull latest images and (re)start services
            # docker compose pull
            # docker compose up -d --remove-orphans
