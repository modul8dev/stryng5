version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:delegated
      - openai-chatgpt:/home/vscode/.config/Code/User/globalStorage/openai.chatgpt
      - codex-config:/home/vscode/.codex
    command: sleep infinity
    depends_on:
      - db
      - redis

  qcluster:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:delegated
    working_dir: /workspace/webapp
    command: /workspace/.venv/bin/python manage.py qcluster
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stryng
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  openai-chatgpt:
  codex-config:
  postgres-data:
