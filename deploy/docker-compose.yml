services:
  stryng_app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      network: host
    image: stryng_app:latest
    restart: unless-stopped
    labels:
      logging: "promtail"
      logging_jobname: "containerlogs"
    container_name: stryng_app
    env_file:
      - ../.env
    ports:
      - '8100:8000'
    volumes:
      - ..:/workspace:delegated
    working_dir: /workspace/
    entrypoint: /bin/bash
    networks:
      - stryng
    command:
      - -c
      - ./start.sh 

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: stryng_redis
    ports:
    - "6379:6379"
    networks:
      - stryng

  qcluster:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:delegated
    working_dir: /workspace/webapp
    command: python manage.py qcluster
    container_name: stryng_qcluster
    env_file:
      - ../.env
    depends_on:
      - redis
    restart: unless-stopped

  nginx:
    image: nginx
    restart: unless-stopped
    labels:
      logging: "promtail"
      logging_jobname: "containerlogs"
    container_name: stryng_nginx
    extra_hosts:
      - "stryng_app:host-gateway"
      - "grafana:host-gateway"
    volumes:
      - ../docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ../docker/nginx/maintenance/:/etc/nginx/html/maintenance/
      - /etc/letsencrypt/live/{{main_domain}}/privkey.pem:/root/ssl/key.pem
      - /etc/letsencrypt/live/{{main_domain}}/fullchain.pem:/root/ssl/cert.pem
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - stryng_app
    networks:
      - stryng

networks:
  stryng:
    name: stryng
