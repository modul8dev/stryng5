<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Maintenance</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.25);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Subtle animated background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 560px;
      width: 100%;
    }

    /* Animated gear icon */
    .icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 88px;
      height: 88px;
      border-radius: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 0 40px var(--accent-glow);
      margin-bottom: 2rem;
    }

    .icon-wrap svg {
      width: 44px;
      height: 44px;
      color: var(--accent);
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    p {
      font-size: 1.0625rem;
      line-height: 1.7;
      color: var(--text-secondary);
      margin-bottom: 2.5rem;
    }

    /* Progress bar */
    .progress-track {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 2.5rem;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), #8b5cf6);
      animation: progress 3s ease-in-out forwards;
    }

    @keyframes progress {
      0%   { width: 0%; }
      40%  { width: 55%; }
      70%  { width: 72%; }
      100% { width: 88%; }
    }

    /* Status pills */
    .status-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      text-align: left;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2.5rem;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.9375rem;
      color: var(--text-secondary);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-green  { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,.6); }
    .dot-yellow { background: #eab308; box-shadow: 0 0 6px rgba(234,179,8,.6); animation: pulse 1.5s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .status-label { flex: 1; }

    .badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2em 0.65em;
      border-radius: 999px;
    }

    .badge-ok  { background: rgba(34,197,94,.15);  color: #4ade80; }
    .badge-wip { background: rgba(234,179,8,.15);  color: #fbbf24; }

    footer {
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="icon-wrap">
      <!-- Gear SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M10.343 3.94c.09-.542.56-.94 1.11-.94h1.093c.55 0 1.02.398 1.11.94l.149.894c.07.424.384.764.78.93.398.164.855.142 1.205-.108l.737-.527a1.125 1.125 0 0 1 1.45.12l.773.774c.39.389.44 1.002.12 1.45l-.527.737c-.25.35-.272.806-.107 1.204.165.397.505.71.93.78l.893.15c.543.09.94.559.94 1.109v1.094c0 .55-.397 1.02-.94 1.11l-.894.149c-.424.07-.764.383-.929.78-.165.398-.143.854.107 1.204l.527.738c.32.447.269 1.06-.12 1.45l-.774.773a1.125 1.125 0 0 1-1.449.12l-.738-.527c-.35-.25-.806-.272-1.203-.107-.398.165-.71.505-.781.929l-.149.894c-.09.542-.56.94-1.11.94h-1.094c-.55 0-1.019-.398-1.11-.94l-.148-.894c-.071-.424-.384-.764-.781-.93-.398-.164-.854-.142-1.204.108l-.738.527c-.447.32-1.06.269-1.45-.12l-.773-.774a1.125 1.125 0 0 1-.12-1.45l.527-.737c.25-.35.272-.806.108-1.204-.165-.397-.506-.71-.93-.78l-.894-.15c-.542-.09-.94-.56-.94-1.109v-1.094c0-.55.398-1.02.94-1.11l.894-.149c.424-.07.765-.383.93-.78.165-.398.143-.854-.108-1.204l-.526-.738a1.125 1.125 0 0 1 .12-1.45l.773-.773a1.125 1.125 0 0 1 1.45-.12l.737.527c.35.25.807.272 1.204.107.397-.165.71-.505.78-.929l.15-.894Z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
      </svg>
    </div>

    <h1>We'll be right back</h1>
    <p>The application is undergoing scheduled maintenance.<br>We're working hard to get everything back up as fast as possible.</p>

    <div class="progress-track">
      <div class="progress-bar"></div>
    </div>

    <div class="status-list">
      <div class="status-item">
        <span class="dot dot-green"></span>
        <span class="status-label">Database</span>
        <span class="badge badge-ok">Operational</span>
      </div>
      <div class="status-item">
        <span class="dot dot-green"></span>
        <span class="status-label">Infrastructure</span>
        <span class="badge badge-ok">Operational</span>
      </div>
      <div class="status-item">
        <span class="dot dot-yellow"></span>
        <span class="status-label">Application</span>
        <span class="badge badge-wip">Updating</span>
      </div>
    </div>

    <footer>
      Need urgent help? <a href="mailto:support@stryng.io">Contact support</a>
    </footer>

  </div>
</body>
</html>
